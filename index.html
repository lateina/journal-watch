<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Journal Watch Plan</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        /* Admin UI Styles */
        #admin-controls {
            margin-top: 2rem;
            text-align: center;
            border-top: 1px solid #eee;
            padding-top: 1rem;
        }

        .edit-btn {
            background: #3498db;
            color: white;
            border: none;
            padding: 5px 10px;
            cursor: pointer;
            border-radius: 4px;
            font-size: 0.8rem;
        }

        .save-btn {
            background: #2ecc71;
            color: white;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
            border-radius: 4px;
            margin-top: 1rem;
        }

        .delete-btn {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 5px 10px;
            cursor: pointer;
            border-radius: 4px;
            font-size: 0.8rem;
            margin-left: 5px;
        }

        input.edit-field {
            width: 100%;
            padding: 5px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }

        #login-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        #login-modal.hidden {
            display: none !important;
        }

        #login-box {
            background: white;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        /* Tabs */
        .tabs {
            display: flex;
            justify-content: center;
            margin-bottom: 1rem;
            border-bottom: 1px solid #ddd;
        }

        .tab-btn {
            background: none;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
            font-size: 1rem;
            color: #666;
            border-bottom: 2px solid transparent;
        }

        .tab-btn.active {
            color: #3498db;
            border-bottom: 2px solid #3498db;
            font-weight: 600;
        }

        .tab-content.hidden {
            display: none;
        }

        #add-employee-btn {
            margin-top: 10px;
            padding: 8px 15px;
            background: #3498db;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <div class="container">
        <header>
            <h1>Journal Watch Plan</h1>
            <p>Kommende Präsentationen</p>
        </header>

        <div class="tabs">
            <button class="tab-btn active" data-tab="schedule">Terminplan</button>
            <button class="tab-btn" data-tab="employees">Mitarbeiter</button>
        </div>

        <main>
            <div id="loading">Lade Daten...</div>
            <div id="error-message" class="hidden"></div>

            <!-- Schedule Tab -->
            <div id="tab-schedule" class="tab-content">
                <table id="schedule-table" class="hidden">
                    <thead>
                        <tr>
                            <th>Datum</th>
                            <th>Tag</th>
                            <th>Referent</th>
                            <th class="col-narrow center-text" title="Gehalten / Vergessen">Statistik</th>
                            <th class="col-narrow center-text">Vergessen?</th>
                            <th class="center-text">Tausch</th>
                            <th>Thema (Optional)</th>
                            <th class="admin-col hidden">Aktion</th>
                        </tr>
                    </thead>
                    <tbody id="schedule-body">
                        <!-- Rows will be inserted here -->
                    </tbody>
                </table>
            </div>

            <!-- Employee Tab -->
            <div id="tab-employees" class="tab-content hidden">
                <table id="employee-table" class="hidden">
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Aktiv</th>
                            <th class="admin-col hidden">Aktion</th>
                        </tr>
                    </thead>
                    <tbody id="employee-body">
                        <!-- Rows will be inserted here -->
                    </tbody>
                </table>
                <button id="add-employee-btn" class="hidden" onclick="addEmployee()">+ Neuer Mitarbeiter</button>
            </div>
        </main>

        <footer>
            <p>&copy; 2026 Journal Watch</p>
            <div id="admin-controls">
                <button id="login-btn">Admin Login</button>
                <div id="admin-panel" class="hidden">
                    <p>Admin Modus Aktiv</p>
                    <button class="save-btn">Änderungen speichern</button>
                    <button id="logout-btn">Logout</button>
                </div>
            </div>
        </footer>
    </div>

    <script>
        window.onerror = function (msg, url, line) {
            alert("Fehler: " + msg + "\nZeile: " + line);
            return false;
        };
    </script>

    <!-- Login Modal -->
    <div id="login-modal" class="hidden">
        <div id="login-box">
            <h3>Admin Login</h3>
            <input type="password" id="password-input" placeholder="Passwort">
            <button onclick="checkLogin()">Login</button>
            <button onclick="hideLogin()">Abbrechen</button>
            <p id="login-error" style="color:red; display:none;">Falsches Passwort!</p>
        </div>
    </div>

    <script src="assets/js/app.js"></script>
</body>

</html>
